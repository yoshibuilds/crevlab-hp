<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="300" height="72" fill="#ffffff"/>

  <!-- C mark -->
  <circle cx="36" cy="36" r="25"
    fill="none"
    stroke="url(#cg)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="118 39"
    stroke-dashoffset="20"/>

  <!-- Accent dot -->
  <circle cx="54" cy="18" r="4"
    fill="#6366f1"
    filter="url(#glow)"/>

  <!-- Wordmark: "clarix" -->
  <text x="84" y="50"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="40"
    fill="#0f172a">clar<tspan fill="#6366f1">ix</tspan></text>
</svg>
